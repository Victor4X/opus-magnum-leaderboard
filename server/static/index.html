<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opus Magnum Leaderboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 1rem; }
  h1 { text-align: center; color: #c9a84c; margin: 1rem 0 0.25rem; font-size: 2rem; letter-spacing: 2px; }
  .subtitle { text-align: center; color: #888; margin-bottom: 0.75rem; font-size: 0.9rem; }
  .legend { text-align: center; margin-bottom: 1.5rem; font-size: 0.8rem; color: #888; }
  .legend span { margin: 0 0.75rem; }
  .leg-global { color: #ffd700; font-weight: bold; }
  .leg-personal { color: #4fc3f7; font-weight: bold; }
  #search { display: block; margin: 0 auto 1.5rem; padding: 0.5rem 1rem; width: min(400px, 100%);
            background: #16213e; border: 1px solid #444; color: #e0e0e0; border-radius: 6px; font-size: 1rem; }
  #search::placeholder { color: #666; }
  .puzzle-section { background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px; margin-bottom: 1.5rem; overflow: hidden; }
  .puzzle-title { background: #0f3460; padding: 0.6rem 1rem; font-size: 1rem; font-weight: bold; color: #c9a84c;
                  display: flex; justify-content: space-between; align-items: center; }
  .puzzle-id { font-size: 0.75rem; color: #888; font-weight: normal; }
  .unverified-badge { font-size: 0.7rem; font-weight: normal; color: #8a6d00; background: #fff3cd; border: 1px solid #ffe69c; border-radius: 3px; padding: 1px 5px; margin-left: 4px; cursor: help; vertical-align: middle; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #0d2137; padding: 0.4rem 0.75rem; text-align: left; font-size: 0.75rem;
       color: #888; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; user-select: none; }
  th:hover { color: #c9a84c; }
  th.sorted-asc::after { content: ' ▲'; color: #c9a84c; }
  th.sorted-desc::after { content: ' ▼'; color: #c9a84c; }
  td { padding: 0.45rem 0.75rem; font-size: 0.9rem; border-top: 1px solid #1e2a3a; }
  tr:hover td { background: #1e2a3a; }
  /* Player separator: slightly darker top border when a new player starts */
  tr.new-player td { border-top: 2px solid #2a3a4a; }
  .rank { color: #666; font-size: 0.8rem; width: 2rem; }
  .global-best { color: #ffd700; font-weight: bold; }
  .personal-best { color: #4fc3f7; font-weight: bold; }
  .null-val { color: #555; }
  #loading { text-align: center; color: #888; padding: 3rem; font-size: 1.2rem; }
  #error { text-align: center; color: #e57373; padding: 3rem; }
  #no-results { text-align: center; color: #666; padding: 2rem; display: none; }
</style>
</head>
<body>
<h1>Opus Magnum Leaderboard</h1>
<p class="subtitle">Each row is a pareto-optimal solution — shown when it's best in at least one metric for that player.</p>
<p class="legend">
  <span class="leg-global">&#9733; global best</span>
  <span class="leg-personal">&#9675; personal best</span>
</p>
<input id="search" type="search" placeholder="Filter puzzles..." oninput="filterPuzzles(this.value)">
<div id="loading">Loading leaderboard...</div>
<div id="error" style="display:none"></div>
<div id="no-results">No puzzles match your search.</div>
<div id="leaderboard"></div>

<script>
let allData = [];
let sortState = {};

async function load() {
  try {
    const resp = await fetch('/api/leaderboard');
    if (!resp.ok) throw new Error(await resp.text());
    const rows = await resp.json();

    const byPuzzle = {};
    for (const r of rows) {
      if (!byPuzzle[r.puzzle_id]) byPuzzle[r.puzzle_id] = { name: r.puzzle_name || r.puzzle_id, rows: [] };
      byPuzzle[r.puzzle_id].rows.push(r);
    }
    allData = Object.entries(byPuzzle)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([puzzle_id, { name, rows }]) => ({ puzzle_id, name, rows }));

    document.getElementById('loading').style.display = 'none';
    renderAll();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = '';
    el.textContent = 'Error loading leaderboard: ' + e.message;
  }
}

function fmt(v) {
  if (v === null || v === undefined) return '<span class="null-val">—</span>';
  return v;
}

const METRICS = ['score', 'cost', 'cycles', 'area', 'instructions'];

// Escape untrusted strings (nicknames, puzzle names/ids) before interpolating
// them into HTML, to prevent stored XSS.
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderPuzzle({ puzzle_id, name, rows }) {
  const state = sortState[puzzle_id] || { col: 'score', asc: true };
  const { col: sortCol, asc: sortAsc } = state;

  const sorted = [...rows].sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (av === null && bv === null) return 0;
    if (av === null) return 1;
    if (bv === null) return -1;
    return sortAsc ? av - bv : bv - av;
  });

  // Global minimum per metric across all rows
  const globalMin = {};
  for (const col of METRICS) {
    const vals = sorted.map(r => r[col]).filter(v => v !== null);
    globalMin[col] = vals.length ? Math.min(...vals) : null;
  }

  // Per-player minimum per metric (across that player's own rows)
  const playerMin = {};
  for (const r of sorted) {
    if (!playerMin[r.nickname]) playerMin[r.nickname] = {};
    for (const col of METRICS) {
      if (r[col] !== null) {
        if (playerMin[r.nickname][col] === undefined || r[col] < playerMin[r.nickname][col])
          playerMin[r.nickname][col] = r[col];
      }
    }
  }

  const thClass = (col) => col === sortCol ? (sortAsc ? 'sorted-asc' : 'sorted-desc') : '';

  // Custom puzzles have no server-side definition, so their scores are taken
  // from the solution file itself rather than checked by the simulator.
  const unverified = rows.length > 0 && !rows.every(r => r.verified);

  // Count distinct players for the header
  const playerCount = new Set(sorted.map(r => r.nickname)).size;

  let lastNickname = null;
  const tbody = sorted.map((r, i) => {
    const isNewPlayer = r.nickname !== lastNickname;
    lastNickname = r.nickname;

    const cells = METRICS.map(col => {
      const v = r[col];
      if (v === null) return `<td><span class="null-val">—</span></td>`;
      const isGlobal   = v === globalMin[col];
      const isPersonal = v === playerMin[r.nickname][col];
      const cls = isGlobal ? 'global-best' : (isPersonal ? 'personal-best' : '');
      return `<td class="${cls}">${v}</td>`;
    }).join('');

    return `<tr class="${isNewPlayer ? 'new-player' : ''}">
      <td class="rank">${i + 1}</td>
      <td>${esc(r.nickname)}</td>
      ${cells}
    </tr>`;
  }).join('');

  return `<div class="puzzle-section" id="puzzle-${esc(puzzle_id)}">
    <div class="puzzle-title">
      <span>${esc(name)} <span class="puzzle-id">${esc(puzzle_id)}</span>${unverified ? ' <span class="unverified-badge" title="Custom puzzle — scores are self-reported by the solution file, not verified by the simulator.">unverified</span>' : ''}</span>
      <span class="puzzle-id">${playerCount} player${playerCount !== 1 ? 's' : ''} &middot; ${sorted.length} solution${sorted.length !== 1 ? 's' : ''}</span>
    </div>
    <table>
      <thead><tr>
        <th class="rank">#</th>
        <th>Player</th>
        <th class="${thClass('score')}"    onclick="sortPuzzle('${puzzle_id}','score')">Score</th>
        <th class="${thClass('cost')}"     onclick="sortPuzzle('${puzzle_id}','cost')">Cost</th>
        <th class="${thClass('cycles')}"   onclick="sortPuzzle('${puzzle_id}','cycles')">Cycles</th>
        <th class="${thClass('area')}"     onclick="sortPuzzle('${puzzle_id}','area')">Area</th>
        <th class="${thClass('instructions')}" onclick="sortPuzzle('${puzzle_id}','instructions')">Instructions</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>
  </div>`;
}

function renderAll(filter = '') {
  const lb = document.getElementById('leaderboard');
  const noResults = document.getElementById('no-results');
  const lower = filter.toLowerCase();
  const visible = filter
    ? allData.filter(d => d.puzzle_id.toLowerCase().includes(lower) || d.name.toLowerCase().includes(lower))
    : allData;

  if (visible.length === 0 && allData.length > 0) {
    lb.innerHTML = '';
    noResults.style.display = '';
  } else {
    noResults.style.display = 'none';
    lb.innerHTML = visible.map(d => renderPuzzle(d)).join('');
  }
}

function sortPuzzle(puzzle_id, col) {
  const cur = sortState[puzzle_id] || { col: 'score', asc: true };
  sortState[puzzle_id] = { col, asc: cur.col === col ? !cur.asc : true };
  renderAll(document.getElementById('search').value);
}

function filterPuzzles(val) { renderAll(val); }

load();
setInterval(load, 30000);
</script>
</body>
</html>
