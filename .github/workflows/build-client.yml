name: Build client

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: om-leaderboard-client-linux-x86_64
            binary: om-leaderboard-client

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: om-leaderboard-client-windows-x86_64
            binary: om-leaderboard-client.exe

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: om-leaderboard-client-macos-aarch64
            binary: om-leaderboard-client

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev \
            libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev \
            libgl1-mesa-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: client
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: client/target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 90
