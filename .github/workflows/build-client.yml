name: Build client

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: om-leaderboard-client-linux-x86_64
            binary: om-leaderboard-client

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: om-leaderboard-client-windows-x86_64
            binary: om-leaderboard-client.exe

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: om-leaderboard-client-macos-aarch64
            binary: om-leaderboard-client

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev \
            libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev \
            libgl1-mesa-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: client
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: client/target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 90

  # Publish the freshly built binaries as a single rolling "latest" release so
  # they are publicly downloadable. Re-created on every push to main.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release files
        run: |
          mkdir release
          # Each artifact is a directory named after the platform (e.g.
          # om-leaderboard-client-linux-x86_64) containing one binary. Rename the
          # binary to that platform name so all three coexist as release assets.
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            file=$(find "$dir" -type f | head -n1)
            case "$file" in
              *.exe) cp "$file" "release/${name}.exe" ;;
              *)     cp "$file" "release/${name}" ;;
            esac
          done
          ls -l release

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the previous release + tag so "latest" always points at this
          # commit's build, then recreate it with the fresh assets.
          gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create latest release/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest build" \
            --notes "Automated build of ${GITHUB_SHA:0:7}."
